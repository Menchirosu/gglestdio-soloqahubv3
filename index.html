<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <!-- X-Frame-Options is set as a real HTTP header in server.ts; browsers ignore it when
         supplied via <meta> and log a console error, so we don't duplicate it here. -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="robots" content="noindex, nofollow" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://apis.google.com https://www.gstatic.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https:;
      connect-src 'self'
        ws://localhost:*
        wss://localhost:*
        https://*.googleapis.com
        https://*.firebaseio.com
        wss://*.firebaseio.com
        https://*.firebase.com
        https://*.firebaseapp.com
        https://firebaseinstallations.googleapis.com
        https://identitytoolkit.googleapis.com
        https://securetoken.googleapis.com
        https://api.dicebear.com
        https://media.giphy.com
        https://api.giphy.com;
      frame-src https://*.firebaseapp.com https://accounts.google.com;
      object-src 'none';
      base-uri 'self';
    " />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23C86948'/><text x='16' y='22' font-size='18' text-anchor='middle' fill='white' font-family='system-ui'>Q</text></svg>" />
    <title>QHUB</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
